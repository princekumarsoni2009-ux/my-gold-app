<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoldBill Pro</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="pb-24">

    <!-- Auth Section -->
    <div id="auth-section" class="p-6 pt-20 text-center">
        <div class="glass p-8 rounded-[2rem]">
            <h1 class="text-3xl font-black text-yellow-500 mb-6">GOLDBILL PRO</h1>
            <input id="email" type="email" placeholder="Email" class="w-full p-4 glass rounded-2xl mb-4 outline-none">
            <input id="pass" type="password" placeholder="Password" class="w-full p-4 glass rounded-2xl mb-6 outline-none">
            <button id="loginBtn" class="w-full bg-yellow-500 text-black font-bold py-4 rounded-2xl active:scale-95 transition">Login / Signup</button>
            <p class="mt-4 text-xs text-gray-500 italic">*Naya user hai toh automatic account ban jayega</p>
        </div>
    </div>

    <!-- Main App Section (Initially Hidden) -->
    <div id="app-section" class="hidden">
        <header class="p-6 flex justify-between items-center">
            <h2 class="text-xl font-bold text-yellow-500 tracking-tighter">GOLDBILL PRO</h2>
            <button id="logoutBtn" class="text-xs text-red-400 bg-red-500/10 px-3 py-1 rounded-lg">Logout</button>
        </header>

        <!-- Home: Live Rate -->
        <div id="home" class="tab-content active p-4 text-center">
            <div class="glass p-10 rounded-[2.5rem] mb-6 relative overflow-hidden">
                <p class="text-gray-400 text-sm mb-2">Live Gold Rate (24K/1g)</p>
                <h3 id="goldPrice" class="text-6xl font-black text-white">₹7,240</h3>
                <div class="mt-4 text-green-400 font-bold">▲ Market Up</div>
                <button id="refreshBtn" class="mt-6 text-xs bg-white/10 px-4 py-2 rounded-full">Refresh Price</button>
            </div>
        </div>

        <!-- Bill Generator -->
        <div id="bills" class="tab-content p-4">
            <div class="glass p-6 rounded-[2rem]">
                <h2 class="text-xl font-bold mb-4">Create Bill</h2>
                <div class="space-y-4">
                    <input id="cName" type="text" placeholder="Customer Name" class="w-full p-4 glass rounded-2xl outline-none">
                    <div class="grid grid-cols-2 gap-4">
                        <input id="cWeight" type="number" placeholder="Weight (g)" class="w-full p-4 glass rounded-2xl outline-none">
                        <input id="cRate" type="number" placeholder="Rate per g" class="w-full p-4 glass rounded-2xl outline-none">
                    </div>
                    <div class="p-6 bg-yellow-500/10 rounded-2xl">
                        <p class="text-xs text-yellow-500 font-bold uppercase">Total Amount</p>
                        <h4 id="totalVal" class="text-3xl font-black">₹0</h4>
                    </div>
                    <button id="pdfBtn" class="w-full bg-yellow-500 text-black font-black py-4 rounded-2xl shadow-lg">DOWNLOAD BILL</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <nav id="navbar" class="hidden fixed bottom-6 left-6 right-6 h-18 glass rounded-full flex justify-around items-center px-6 z-50">
        <button onclick="changeTab('home')" class="text-2xl">🏠</button>
        <button onclick="changeTab('bills')" class="text-2xl text-gray-500">📄</button>
    </nav>

    <!-- FIREBASE & LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // AAPKA CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyD07v6qefZ8GtvUiTrsaQCmfzqmbTUly-I",
            authDomain: "manishtechjewells-87b42.firebaseapp.com",
            projectId: "manishtechjewells-87b42",
            storageBucket: "manishtechjewells-87b42.firebasestorage.app",
            messagingSenderId: "713754712214",
            appId: "1:713754712214:web:4d968b9ce9b864d2ad4ab7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // UI Variables
        const authSection = document.getElementById('auth-section');
        const appSection = document.getElementById('app-section');
        const navbar = document.getElementById('navbar');

        // Login Function
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            if(!email || !pass) return alert("Email/Password daalein");

            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (error) {
                try {
                    await createUserWithEmailAndPassword(auth, email, pass);
                } catch (e) { alert("Error: " + e.message); }
            }
        });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

        // Auth Listener
        onAuthStateChanged(auth, (user) => {
            if (user) {
                authSection.classList.add('hidden');
                appSection.classList.remove('hidden');
                navbar.classList.remove('hidden');
            } else {
                authSection.classList.remove('hidden');
                appSection.classList.add('hidden');
                navbar.classList.add('hidden');
            }
        });

        // Live Calculation
        document.addEventListener('input', () => {
            const w = document.getElementById('cWeight').value || 0;
            const r = document.getElementById('cRate').value || 0;
            document.getElementById('totalVal').innerText = "₹" + (w * r).toLocaleString();
        });

        // PDF Download
        document.getElementById('pdfBtn').addEventListener('click', () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const name = document.getElementById('cName').value || "Customer";
            doc.setFontSize(22);
            doc.text("GOLDBILL PRO INVOICE", 20, 20);
            doc.setFontSize(14);
            doc.text("Customer: " + name, 20, 40);
            doc.text("Total: " + document.getElementById('totalVal').innerText, 20, 60);
            doc.save("Bill.pdf");
        });

        // Refresh Price Simulator
        document.getElementById('refreshBtn').addEventListener('click', () => {
            const newRate = 7000 + Math.floor(Math.random() * 500);
            document.getElementById('goldPrice').innerText = "₹" + newRate;
        });

        // Tab Switcher
        window.changeTab = (tabId) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        };

        // Service Worker for Install
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
